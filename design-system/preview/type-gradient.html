<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Gradient Headlines</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; }
  body {
    font-family: "Poppins", sans-serif;
    background: linear-gradient(180deg, #FFFFFF 0%, #F4F8FB 100%);
    padding: 20px 24px; color: #0F2A36;
  }
  .h { font-family: "Poppins", sans-serif; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em;
       -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
       margin: 0 0 6px; }
  .meta { font-size: 11px; color: #8FA6B2; font-family: var(--tr-font-mono); margin-bottom: 14px; display: block; }
  .h1 { font-size: 40px; font-weight: 800; background: linear-gradient(90deg, #0F2A36 0%, #155E75 60%, #0E7490 100%); }
  .h2 { font-size: 32px; background: linear-gradient(90deg, #0D9488 0%, #0284C7 50%, #6D5BBA 100%); }
  .h3 { font-size: 24px; background: linear-gradient(90deg, #0284C7 0%, #0E7490 100%); }
</style>
</head>
<body>
  <div class="h h1">Smart Tools for Modern Therapists</div>
  <span class="meta">white → cyan-100 → sky-100 · hero h1 · Poppins 800</span>
  <div class="h h2">Latest Resources & Articles</div>
  <span class="meta">aqua-200 → sky-300 → lavender-300 · page h2 · Poppins 700</span>
  <div class="h h3">Therapist Resources</div>
  <span class="meta">sky-400 → cyan-400 · brand wordmark · Poppins 700</span>
</body>
</html>
